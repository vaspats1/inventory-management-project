<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
  <title>Thessaloniki Streets — Alpha</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, 'Arial', sans-serif; }
    #c { display: block; width: 100vw; height: 100vh; touch-action: none; }

    /* ── HUD ── */
    #hud { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }

    #team-banner {
      position: absolute; top: env(safe-area-inset-top, 12px); left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.75); color: #fff; padding: 5px 18px;
      border-radius: 20px; font-size: 13px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase;
      border: 1px solid rgba(255,255,255,.2);
    }

    #bars-wrap { position: absolute; left: 14px; bottom: 210px; width: 150px; }
    .bar-label { color: #aaa; font-size: 10px; margin-bottom: 3px; letter-spacing: 1px; }
    .bar-bg { background: rgba(0,0,0,.55); border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,.15); margin-bottom: 10px; }
    #health-bg { height: 13px; }
    #stamina-bg { height: 8px; }
    #health-fill { background: linear-gradient(90deg,#e74c3c,#c0392b); height: 100%; width: 100%; border-radius: 4px; transition: width .12s; }
    #stamina-fill { background: linear-gradient(90deg,#f39c12,#e67e22); height: 100%; width: 100%; border-radius: 4px; transition: width .08s; }

    #molotov-hud {
      position: absolute; right: 16px; bottom: 230px;
      background: rgba(0,0,0,.65); border: 1px solid rgba(255,100,0,.5);
      border-radius: 10px; padding: 8px 12px; text-align: center; color: #fff;
    }
    #molotov-hud .ico { font-size: 22px; display: block; }
    #molotov-hud .cnt { font-size: 13px; font-weight: 800; color: #ff7700; }

    #enemy-counter {
      position: absolute; top: 58px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.65); color: #ff4444; font-size: 11px; font-weight: 700;
      letter-spacing: 1px; border-radius: 6px; padding: 4px 12px;
    }

    #minimap-wrap {
      position: absolute; top: 58px; right: 14px;
      width: 88px; height: 88px; border-radius: 50%;
      overflow: hidden; border: 2px solid rgba(255,255,255,.25);
      background: rgba(0,0,0,.7);
    }
    #minimap { width: 88px; height: 88px; }

    #objective {
      position: absolute; top: 160px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.7); color: #ffcc44; font-size: 11px;
      padding: 5px 14px; border-radius: 6px; letter-spacing: 1px; font-weight: 600;
      opacity: 1; transition: opacity 1s;
    }

    /* ── CONTROLS ── */
    #controls-layer {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 210px;
      z-index: 20; pointer-events: none;
    }

    #joystick-zone {
      position: absolute; left: 0; top: 0; width: 50%; height: 100%;
      pointer-events: auto;
    }
    #joy-base {
      position: absolute; width: 96px; height: 96px; border-radius: 50%;
      background: rgba(255,255,255,.08); border: 2px solid rgba(255,255,255,.25);
      display: none; transform: translate(-50%,-50%);
    }
    #joy-knob {
      position: absolute; width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,.55); top: 50%; left: 50%; transform: translate(-50%,-50%);
    }

    .act-btn {
      position: absolute; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 11px; font-weight: 800; letter-spacing: .5px; text-align: center;
      pointer-events: auto; user-select: none; -webkit-user-select: none;
      transition: transform .08s, opacity .08s; border: 2px solid;
    }
    .act-btn:active { transform: scale(.9); opacity: .8; }

    #btn-punch {
      right: 88px; bottom: 36px; width: 68px; height: 68px;
      background: rgba(190,40,40,.85); border-color: rgba(255,100,100,.8);
    }
    #btn-heavy {
      right: 18px; bottom: 80px; width: 58px; height: 58px;
      background: rgba(130,30,190,.85); border-color: rgba(190,100,255,.8);
    }
    #btn-throw {
      right: 22px; bottom: 152px; width: 58px; height: 58px;
      background: rgba(190,90,0,.85); border-color: rgba(255,160,0,.8);
    }

    #cam-zone {
      position: fixed; right: 0; top: 0; width: 50%; height: calc(100% - 210px);
      z-index: 19; pointer-events: auto; touch-action: none;
    }

    /* ── MENU ── */
    #menu {
      position: fixed; inset: 0; background: rgba(0,0,0,.97);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; color: #fff;
    }
    .menu-title {
      font-size: 30px; font-weight: 900; letter-spacing: 4px; text-transform: uppercase;
      background: linear-gradient(135deg,#ff6600,#ffcc00);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }
    .menu-sub { font-size: 12px; color: #666; letter-spacing: 2px; margin-bottom: 10px; }
    .menu-pick { font-size: 11px; color: #888; margin-bottom: 30px; letter-spacing: 1px; }

    .team-btn {
      width: 230px; padding: 18px 24px; margin: 8px; border-radius: 12px;
      cursor: pointer; font-size: 20px; font-weight: 900; letter-spacing: 3px;
      text-transform: uppercase; text-align: center; border: 2px solid;
      pointer-events: auto; transition: transform .1s; -webkit-tap-highlight-color: transparent;
    }
    .team-btn:active { transform: scale(.95); }
    #btn-paok { background: #0a0a0a; border-color: #eee; color: #eee; }
    #btn-iraklis { background: #003580; border-color: #ffcc00; color: #ffcc00; }

    .menu-hint { position: absolute; bottom: 30px; font-size: 10px; color: #444; letter-spacing: 1px; }

    /* ── GAME OVER ── */
    #gameover {
      position: fixed; inset: 0; background: rgba(0,0,0,.88);
      display: none; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; color: #fff;
    }
    #gameover.show { display: flex; }
    #go-title { font-size: 52px; font-weight: 900; margin-bottom: 10px; }
    #go-sub { font-size: 14px; color: #888; margin-bottom: 36px; }
    #btn-restart {
      padding: 14px 44px; font-size: 15px; font-weight: 800; letter-spacing: 2px;
      background: #c0392b; color: #fff; border: none; border-radius: 10px;
      cursor: pointer; text-transform: uppercase;
    }

    /* ── DAMAGE FLASH ── */
    #hit-flash {
      position: fixed; inset: 0; background: rgba(200,0,0,.35);
      pointer-events: none; z-index: 50; opacity: 0; transition: opacity .15s;
    }
    #hit-flash.flash { opacity: 1; }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div id="team-banner">PAOK</div>
  <div id="bars-wrap">
    <div class="bar-label">HEALTH</div>
    <div class="bar-bg" id="health-bg"><div id="health-fill"></div></div>
    <div class="bar-label">STAMINA</div>
    <div class="bar-bg" id="stamina-bg"><div id="stamina-fill"></div></div>
  </div>
  <div id="molotov-hud"><span class="ico">🍾</span><span class="cnt" id="mol-cnt">×3</span></div>
  <div id="enemy-counter">ENEMIES: 20</div>
  <div id="minimap-wrap"><canvas id="minimap" width="88" height="88"></canvas></div>
  <div id="objective">DEFEND THE STREETS — BEAT DOWN EVERY HOOLIGAN</div>
</div>

<div id="controls-layer">
  <div id="joystick-zone">
    <div id="joy-base"><div id="joy-knob"></div></div>
  </div>
  <div id="btn-punch" class="act-btn">PUNCH</div>
  <div id="btn-heavy" class="act-btn">HEAVY</div>
  <div id="btn-throw" class="act-btn">🍾<br>THROW</div>
</div>
<div id="cam-zone"></div>

<div id="menu">
  <div class="menu-title">Thessaloniki Streets</div>
  <div class="menu-sub">GREEK HOOLIGANISM — ALPHA</div>
  <div class="menu-pick">CHOOSE YOUR SIDE</div>
  <div id="btn-paok" class="team-btn">⚫ PAOK</div>
  <div id="btn-iraklis" class="team-btn">🔵 IRAKLIS</div>
  <div class="menu-hint">JOYSTICK LEFT · PUNCH/HEAVY RIGHT · THROW MOLOTOV TOP-RIGHT</div>
</div>

<div id="gameover">
  <div id="go-title">YOU WIN</div>
  <div id="go-sub">The streets are yours tonight.</div>
  <button id="btn-restart" onclick="location.reload()">PLAY AGAIN</button>
</div>

<div id="hit-flash"></div>

<!-- Three.js r128 UMD (global THREE) — widely cached on CDN, works on iOS Safari -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="game.js"></script>
</body>
</html>
